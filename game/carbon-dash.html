<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carbon Footprint Dash</title>

<style>
/* ----------------------------------------- */
/* ----------- THEME VARIABLES -------------- */
/* ----------------------------------------- */
:root {
    --bg-color: #0c0a1a;
    --primary-card: #1a1829;
    --secondary-card: #2a2837;
    --accent-purple: #763bf3;
    --accent-pink: #9b59b6;
    --text-primary: #ffffff;
    --text-secondary: #a9a6b8;
    --border-color: rgba(255, 255, 255, 0.1);
    --hero-gradient: radial-gradient(ellipse 50% 40% at 50% 45%, rgba(118, 59, 243, 0.4), transparent);
}

body.light-theme {
    --bg-color: #f0fdf4;
    --primary-card: #ffffff;
    --secondary-card: #e2f3e1;
    --accent-purple: #763bf3;
    --accent-pink: #9b59b6;
    --text-primary: #222222;
    --text-secondary: #555555;
    --border-color: rgba(0, 0, 0, 0.15);
}

/* ----------------------------------------- */
/* ----------------- GAME UI ---------------- */
/* ----------------------------------------- */

body {
    background: var(--bg-color);
    color: var(--text-primary);
    font-family: "Inter", sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

/* Game Card */
.game-container {
    background: var(--primary-card);
    padding: 35px;
    border-radius: 16px;
    width: 380px;
    border: 1px solid var(--border-color);
    box-shadow: 0 0 25px rgba(118, 59, 243, 0.4);
    animation: fadeIn 0.4s ease-out;
    text-align: center;
}

/* Timer Bar */
#timer-bar {
    height: 12px;
    background: var(--accent-purple);
    border-radius: 10px;
    margin: 20px 0;
    transition: width linear;
}

/* Buttons */
.game-btn {
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    border-radius: 10px;
    border: 1px solid var(--border-color);
    background: var(--secondary-card);
    color: var(--text-primary);
    cursor: pointer;
    font-size: 17px;
    transition: 0.3s;
}

.game-btn:hover {
    transform: translateY(-3px);
    border-color: var(--accent-purple);
    box-shadow: 0 0 15px rgba(118, 59, 243, 0.5);
}

/* Toggle Theme Button */
.theme-toggle {
    background: none;
    border: 1px solid var(--border-color);
    width: 40px;
    height: 40px;
    color: var(--text-primary);
    border-radius: 50%;
    cursor: pointer;
    position: absolute;
    top: 25px;
    right: 25px;
}

/* Animation */
@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.97); }
    to { opacity: 1; transform: scale(1); }
}
</style>
</head>

<body>

<button class="theme-toggle" onclick="toggleTheme()">🌙</button>

<div class="game-container">
    <h1>Carbon Footprint Dash</h1>
    <p style="color: var(--text-secondary); font-size: 14px;">
        Choose the LOWER carbon option!
    </p>

    <div id="timer-bar"></div>
    <div id="question-box"></div>

    <button id="optionA" class="game-btn"></button>
    <button id="optionB" class="game-btn"></button>

    <h3>Score: <span id="score">0</span></h3>
    <h3>Lives: <span id="lives">3</span></h3>
</div>

<script>
/* ----------------------------------------- */
/* ----------- QUESTION DATABASE ------------ */
/* ----------------------------------------- */
const questions = [
  { text: "Lower emissions?", A:{label:"Bike",co2:1}, B:{label:"Car",co2:20} },
  { text: "Greener choice:", A:{label:"LED Bulb",co2:2}, B:{label:"CFL Bulb",co2:6} },
  { text: "Better for climate?", A:{label:"Plant-based Meal",co2:3}, B:{label:"Beef Burger",co2:25} },
  { text: "Eco-friendly transport:", A:{label:"Electric Bus",co2:5}, B:{label:"Diesel Car",co2:40} },
  { text: "Lower CO₂?", A:{label:"Reusable Bottle",co2:1}, B:{label:"Plastic Bottle",co2:8} },
  { text: "Greener energy:", A:{label:"Solar Power",co2:2}, B:{label:"Coal Power",co2:60} },
  { text: "Food impact:", A:{label:"Rice",co2:4}, B:{label:"Beef",co2:27} },
  { text: "Best for climate:", A:{label:"Train Travel",co2:10}, B:{label:"Airplane Travel",co2:120} },
  { text: "Lower carbon:", A:{label:"Recycling",co2:2}, B:{label:"New Production",co2:10} },
  { text: "Eco-friendly:", A:{label:"Video Call",co2:1}, B:{label:"Physical Meeting",co2:15} },
  { text: "Cleaner fuel:", A:{label:"Electric Scooter",co2:2}, B:{label:"Petrol Scooter",co2:25} },
  { text: "Better for Earth:", A:{label:"Cloth Bag",co2:1}, B:{label:"Plastic Bag",co2:5} },
  { text: "Lower footprint:", A:{label:"Local Veggies",co2:2}, B:{label:"Imported Veggies",co2:9} },
  { text: "Eco-choice:", A:{label:"Cold Water Wash",co2:2}, B:{label:"Hot Water Wash",co2:7} },
  { text: "Less pollution:", A:{label:"Carpooling",co2:6}, B:{label:"Solo Driving",co2:22} }
];

/* ----------------------------------------- */
/* ------------ GAME LOGIC ------------------ */
/* ----------------------------------------- */
let score = 0;
let lives = 3;
let current = 0;
let timer;

function loadQuestion() {
    if (lives <= 0) return gameOver();

    let q = questions[current];
    document.getElementById("question-box").textContent = q.text;
    document.getElementById("optionA").textContent = q.A.label;
    document.getElementById("optionB").textContent = q.B.label;

    document.getElementById("score").textContent = score;
    document.getElementById("lives").textContent = lives;

    startTimer();
}

function startTimer() {
    clearInterval(timer);
    let timeLeft = 100;
    const bar = document.getElementById("timer-bar");

    timer = setInterval(() => {
        timeLeft--;
        bar.style.width = timeLeft + "%";

        if (timeLeft <= 0) {
            clearInterval(timer);
            lives--;
            nextQuestion();
        }
    }, 30);
}

function checkAnswer(choice) {
    clearInterval(timer);
    const q = questions[current];

    const chosen = q[choice];
    const other = q[choice === "A" ? "B" : "A"];

    if (chosen.co2 < other.co2) score++;
    else lives--;

    nextQuestion();
}

function nextQuestion() {
    current = Math.floor(Math.random() * questions.length);
    loadQuestion();
}

function gameOver() {
    alert("Game Over! Your score: " + score);
    location.reload();
}

/* ----------------------------------------- */
/* ----------- EVENT LISTENERS ------------- */
/* ----------------------------------------- */
document.getElementById("optionA").onclick = () => checkAnswer("A");
document.getElementById("optionB").onclick = () => checkAnswer("B");

loadQuestion();

/* ----------------------------------------- */
/* ----------- THEME TOGGLE ---------------- */
/* ----------------------------------------- */
function toggleTheme() {
    document.body.classList.toggle("light-theme");
}
</script>

</body>
</html>
