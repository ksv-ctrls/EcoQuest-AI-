<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top left, #361d4d 20%, #4A7A66 80%);
      font-family: "Segoe UI", Arial, sans-serif;
      overflow: hidden;
    }
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(255, 215, 0, 0.1) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .login-container {
      background: #361d4d; /* darker amethyst */
      border-radius: 16px;
      padding: 30px 28px;
      width: 340px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      border: 2px solid #4A7A66; /* deep sage border */
      position: relative;
      z-index: 1;
    }

    .login-container h2 {
      text-align: center;
      color: #c7d7c2;
      margin-bottom: 20px;
      font-size: 24px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    label {
      font-size: 14px;
      color: #c7d7c2;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid #c7d7c2;
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      font-size: 15px;
      outline: none;
      box-sizing: border-box;
    }

    input::placeholder {
      color: #b9d0c1;
    }

    input:focus {
      border: 1px solid #ffd700;
      box-shadow: 0 0 8px #ffd700;
    }

    button {
      margin-top: 8px;
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #4A7A66; /* deep sage button */
      color: #361d4d; /* dark amethyst text */
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.25s;
    }

    button:hover {
      background: #361d4d; /* dark amethyst hover */
      color: #ffd700;
      transform: translateY(-2px);
      border-style:solid;
      border-radius: 8px;
      border-color: #ffd700;
      border-width: thin;
    }

    .signup {
      text-align: center;
      margin-top: 18px;
      font-size: 14px;
      color: #d8e3d3;
    }

    .signup a {
      color: #ffd700;
      text-decoration: none;
      font-weight: bold;
    }

    .signup a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Welcome Back</h2>
    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password">
      </div>

      <button type="submit">Login</button>
    </form>
    <p class="signup">Don’t have an account? <a href="signup.html">Sign up</a></p>
  </div>
  <script>
    const fakeUser = {
      email: "ksv@gmail.com",
      password: "ksv01",
      name: "sam",
      points: 1500
    };

    const form = document.getElementById("loginForm");
    form.addEventListener("submit", function(e) {
      e.preventDefault();
      const username = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      if(username === fakeUser.email && password === fakeUser.password) {
        // Store user data in localStorage to simulate login state
        localStorage.setItem("user", JSON.stringify(fakeUser));
        // Redirect to dashboard.html (adjust to your dashboard file)
        window.location.href = "dashboard.html";
      } else {
        alert("Invalid credentials");
      }
    });
  </script>
</body>
</html>
